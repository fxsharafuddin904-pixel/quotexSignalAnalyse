<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Trading Signal AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">

  <div class="auth-card">

    <h1>🔐 Login</h1>
    <p>Login to your account</p>

    <form id="loginForm">

      <input
        type="email"
        id="email"
        placeholder="Email Address"
        required
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      >

      <button type="submit">
        Login
      </button>

    </form>

    <p class="bottom-text">
      Don't have an account?
      <a href="signup.html">
        Sign Up
      </a>
    </p>

    <p class="bottom-text">
      <a href="admin.html">
        Admin Panel
      </a>
    </p>

  </div>

</div>

<script>
document
.getElementById("loginForm")
.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email =
    document.getElementById("email").value;

  const password =
    document.getElementById("password").value;

  try {

    const res = await fetch(
      "/api/auth/login",
      {
        method: "POST",
        headers: {
          "Content-Type":
            "application/json"
        },
        body: JSON.stringify({
          email,
          password
        })
      }
    );

    const data = await res.json();

    if (data.success) {

      localStorage.setItem(
        "token",
        data.token
      );

      localStorage.setItem(
        "user",
        JSON.stringify(data.user)
      );

      if (data.user.role === "admin") {
        window.location =
          "admin.html";
      } else {
        window.location =
          "dashboard.html";
      }

    } else {
      alert(data.message);
    }

  } catch (err) {
    alert("Server Error");
  }
});
</script>

</body>
  </html>
